<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       CSS VARIABLES - Colors and design tokens
       Change these to update the whole site theme
       ============================================= */
    :root {
      --primary:      #2563eb;
      --primary-dark: #1e40af;
      --accent:       #06b6d4;
      --success:      #10b981;
      --danger:       #ef4444;
      --warning:      #f59e0b;
      --bg:           #0f172a;
      --bg-card:      #1e293b;
      --bg-input:     #0f172a;
      --border:       #334155;
      --text:         #f1f5f9;
      --text-muted:   #94a3b8;
      --radius:       14px;
      --shadow:       0 25px 50px -12px rgba(0,0,0,.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .15;
      pointer-events: none;
    }
    body::before {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--primary), transparent);
      top: -200px; left: -200px;
      animation: float 8s ease-in-out infinite;
    }
    body::after {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--accent), transparent);
      bottom: -200px; right: -200px;
      animation: float 10s ease-in-out infinite reverse;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(30px, 30px); }
    }

    /* ---- Card ---- */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
      animation: slideUp .4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Logo ---- */
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 800;
      font-family: 'Sora', sans-serif;
      color: white;
    }
    .logo-text h1 {
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
    }
    .logo-text p {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ---- Tabs ---- */
    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      gap: 4px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      transition: all .25s;
    }
    .tab-btn.active {
      background: var(--primary);
      color: white;
    }

    /* ---- Forms ---- */
    .form-section { display: none; }
    .form-section.active { display: block; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 7px;
      letter-spacing: .02em;
    }

    input, select {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }
    input::placeholder { color: var(--text-muted); }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ---- Button ---- */
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      margin-top: 8px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(37,99,235,.4); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* ---- Alert ---- */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
      animation: fadeIn .2s ease;
    }
    .alert.show { display: block; }
    .alert-error   { background: rgba(239,68,68,.12); border: 1px solid rgba(239,68,68,.3); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,.12); border: 1px solid rgba(16,185,129,.3); color: #6ee7b7; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ---- Admin link ---- */
    .admin-link {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .admin-link a {
      color: var(--text-muted);
      font-size: 13px;
      text-decoration: none;
      transition: color .2s;
    }
    .admin-link a:hover { color: var(--accent); }

    /* ---- Subjects tag area ---- */
    .subjects-note {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">

  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">SA</div>
    <div class="logo-text">
      <h1>Student Portal</h1>
      <p>Attendance Management System</p>
    </div>
  </div>

  <!-- Sign In / Sign Up Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn"        onclick="switchTab('signup')">Sign Up</button>
  </div>

  <!-- Alert messages -->
  <div class="alert alert-error"   id="alertError"></div>
  <div class="alert alert-success" id="alertSuccess"></div>

  <!-- =============================================
       SIGN IN FORM
       ============================================= -->
  <div class="form-section active" id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" />
    </div>
    <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
  </div>

  <!-- =============================================
       SIGN UP FORM
       ============================================= -->
  <div class="form-section" id="signupForm">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signupName" placeholder="John Doe" />
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="your@email.com" />
    </div>
    <div class="row-2">
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="signupRoll" placeholder="e.g. CS-2024-001" />
      </div>
      <div class="form-group">
        <label>Class / Year</label>
        <input type="text" id="signupClass" placeholder="e.g. B.Tech CS-3" />
      </div>
    </div>
    <div class="form-group">
      <label>Password (min 6 characters)</label>
      <input type="password" id="signupPassword" placeholder="Create a strong password" />
    </div>
    <p class="subjects-note">
      📚 Default subjects (Mathematics, Physics, Chemistry) will be assigned.
      Admin can update your subjects later.
    </p>
    <button class="btn" id="signupBtn" onclick="handleSignup()" style="margin-top:16px">
      Create Account
    </button>
  </div>

  <!-- Admin link at bottom -->
  <div class="admin-link">
    <a href="admin.html">🔒 Admin Panel Login</a>
  </div>

</div>

<!-- Load the API helper file -->
<script src="js/api.js"></script>
<script>
  // ============================================================
  // PAGE LOGIC
  // ============================================================

  // If already logged in as student, redirect to dashboard
  if (TokenManager.isLoggedIn() && TokenManager.getRole() === 'student') {
    window.location.href = 'dashboard.html';
  }

  // ---- Tab Switcher ----
  function switchTab(tab) {
    // Toggle active class on tab buttons
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
    });
    // Toggle active class on form sections
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    clearAlerts();
  }

  // ---- Show/Hide Alerts ----
  function showAlert(type, message) {
    clearAlerts();
    const el = document.getElementById(type === 'error' ? 'alertError' : 'alertSuccess');
    el.textContent = message;
    el.classList.add('show');
  }
  function clearAlerts() {
    document.getElementById('alertError').classList.remove('show');
    document.getElementById('alertSuccess').classList.remove('show');
  }

  // ---- Set button loading state ----
  function setLoading(btnId, loading, text) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? `<span class="spinner"></span> ${text}...` : text;
  }

  // ============================================================
  // HANDLE LOGIN
  // Called when "Sign In" button is clicked
  // ============================================================
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    // Basic client-side validation
    if (!email || !password) {
      showAlert('error', 'Please enter your email and password.');
      return;
    }

    setLoading('loginBtn', true, 'Signing In');

    try {
      // Call the API login function (defined in api.js)
      const data = await AuthAPI.login({ email, password });

      // Save the token and student info to localStorage
      TokenManager.save(data.token, 'student');
      localStorage.setItem('studentData', JSON.stringify(data.student));

      showAlert('success', `Welcome back, ${data.student.name}! Redirecting...`);

      // Redirect to dashboard after a short delay
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
    } catch (error) {
      // Show the error message from the server
      showAlert('error', error.message || 'Login failed. Please try again.');
      setLoading('loginBtn', false, 'Sign In');
    }
  }

  // ============================================================
  // HANDLE SIGNUP
  // Called when "Create Account" button is clicked
  // ============================================================
  async function handleSignup() {
    const name     = document.getElementById('signupName').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const roll     = document.getElementById('signupRoll').value.trim();
    const cls      = document.getElementById('signupClass').value.trim();
    const password = document.getElementById('signupPassword').value;

    // Validation
    if (!name || !email || !roll || !cls || !password) {
      showAlert('error', 'Please fill in all fields.');
      return;
    }
    if (password.length < 6) {
      showAlert('error', 'Password must be at least 6 characters.');
      return;
    }

    setLoading('signupBtn', true, 'Creating Account');

    try {
      const data = await AuthAPI.signup({
        name, email, password,
        rollNumber: roll,
        class: cls,
      });

      // Save token and redirect
      TokenManager.save(data.token, 'student');
      localStorage.setItem('studentData', JSON.stringify(data.student));

      showAlert('success', 'Account created successfully! Redirecting to dashboard...');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
    } catch (error) {
      showAlert('error', error.message || 'Signup failed. Please try again.');
      setLoading('signupBtn', false, 'Create Account');
    }
  }

  // Allow pressing Enter to submit forms
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const loginActive = document.getElementById('loginForm').classList.contains('active');
      if (loginActive) handleLogin();
      else handleSignup();
    }
  });
</script>
</body>
</html>
